name: pypi

# Single workflow for the dig-client PyPI package, mirroring npm.yml:
#
#   push to main / workflow_dispatch -> canary  : dig-client {version}.dev<run>   (pip --pre only)
#   a published GitHub release       -> release : dig-client {version}
#
# Auth is auto-detected per job: if the PYPI_TOKEN secret is set it is used
# (twine), otherwise OIDC trusted publishing. The token is a temporary bridge
# while the OIDC pending publisher is unavailable (e.g. waiting on PyPI org
# validation); prefer OIDC and drop the token once it works. The canary is gated
# on the CANARY_ENABLED repo variable.
#
# attestations — PyPI digital attestations (like npm provenance) require a PUBLIC
# repo AND OIDC. vllnt/dig is now public, so the OIDC publish steps set
# attestations: true; the token-bridge steps keep it false (a token can't attest).

on:
  push:
    branches: [main]
    paths:
      - "clients/python/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/pypi.yml"
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: pypi-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build dig
        run: go build -o "$RUNNER_TEMP/dig" ./cmd/dig
        working-directory: .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test against a real dig serve
        run: python -m unittest discover -s tests -v
        env:
          DIG_BIN: ${{ runner.temp }}/dig

  canary:
    name: Publish Canary
    needs: quality
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.CANARY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp a PEP 440 dev version
        env:
          RUN: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          run = os.environ["RUN"]
          text = re.sub(
              r'(?m)^version = "([^"]+)"',
              lambda m: f'version = "{m.group(1)}.dev{run}"',
              text,
              count=1,
          )
          path.write_text(text)
          PY
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Detect PyPI auth (token bridge, else OIDC)
        id: auth
        env:
          TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "mode=token" >> "$GITHUB_OUTPUT"; else echo "mode=oidc" >> "$GITHUB_OUTPUT"; fi
      - name: Publish canary (token)
        if: steps.auth.outputs.mode == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          attestations: false
          password: ${{ secrets.PYPI_TOKEN }}
      - name: Publish canary (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          attestations: true

  release:
    name: Publish Release
    needs: quality
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Detect PyPI auth (token bridge, else OIDC)
        id: auth
        env:
          TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then echo "mode=token" >> "$GITHUB_OUTPUT"; else echo "mode=oidc" >> "$GITHUB_OUTPUT"; fi
      - name: Publish release (token)
        if: steps.auth.outputs.mode == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          attestations: false
          password: ${{ secrets.PYPI_TOKEN }}
      - name: Publish release (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          attestations: true

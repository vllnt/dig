name: CLI Canary

# The Go CLI canary: every push to main builds a GoReleaser snapshot and moves a
# rolling `canary` GitHub prerelease to the commit. Needs only GITHUB_TOKEN.
# The npm and PyPI artifacts have their own single workflows (npm.yml, pypi.yml,
# each canary + release); the CLI stable release is release.yml (GoReleaser/tag).
# See docs/RELEASING.md.

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"
      - ".github/workflows/canary.yml"
  workflow_dispatch: {}

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  cli:
    name: Canary CLI
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build canary binaries (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
      - name: Publish rolling canary prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          # Move the rolling "canary" tag + release to this commit.
          gh release delete canary --yes --cleanup-tag 2>/dev/null || true
          gh release create canary \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Canary (main@${SHORT_SHA})" \
            --notes "Rolling canary built from \`main@${SHORT_SHA}\`. Bleeding edge — **not for production**. For stable installs see the README." \
            dist/dig_*.tar.gz dist/dig_*.zip dist/checksums.txt

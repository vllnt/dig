name: npm

# Single workflow for the @vllnt/dig npm package, modeled on @vllnt/ui's
# publish.yml — canary and release live here, not split across files:
#
#   push to main                 -> canary  : @vllnt/dig@{version}-canary.<sha>  (tag: canary)
#   a published GitHub release   -> release : @vllnt/dig@{version}               (tag: latest)
#   workflow_dispatch            -> release : same, on demand
#
# Both publish via OIDC trusted publishing (no token) — configure ONE trusted
# publisher for @vllnt/dig pointing at this workflow (npm.yml). The canary is
# gated on the CANARY_ENABLED repo variable; the release always runs. The Go CLI
# and PyPI artifacts have their own workflows.

on:
  push:
    branches: [main]
    paths:
      - "clients/typescript/**"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/npm.yml"
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: npm-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build dig
        run: go build -o "$RUNNER_TEMP/dig" ./cmd/dig
        working-directory: .
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build
      - name: Test against a real dig serve
        run: pnpm test
        env:
          DIG_BIN: ${{ runner.temp }}/dig

  canary:
    name: Publish Canary
    needs: quality
    if: github.event_name == 'push' && vars.CANARY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - name: Publish canary (OIDC trusted publishing)
        run: |
          # Force OIDC: drop any token auth so npm uses trusted publishing.
          sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" 2>/dev/null || true
          unset NODE_AUTH_TOKEN
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          npm version "${BASE_VERSION}-canary.${SHORT_SHA}" --no-git-tag-version
          # No --provenance: npm rejects sigstore provenance for PRIVATE repos.
          # Re-add `--provenance` once vllnt/dig is public. OIDC auth is unaffected.
          npx --yes npm@latest publish --tag canary --access public

  release:
    name: Publish Release
    needs: quality
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - name: Publish release (OIDC, sets the `latest` tag)
        run: |
          sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" 2>/dev/null || true
          unset NODE_AUTH_TOKEN
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@vllnt/dig@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::@vllnt/dig@${VERSION} is already published — bump clients/typescript/package.json before releasing."
            exit 1
          fi
          # No --provenance while the repo is private (see the canary job). Re-add
          # `--provenance` once vllnt/dig is public.
          npx --yes npm@latest publish --tag latest --access public
